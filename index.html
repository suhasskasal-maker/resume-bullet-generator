<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume Bullet Generator</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-base:       #0f1117;
      --bg-surface:    #161b27;
      --bg-elevated:   #1e2535;
      --border:        #2a3347;
      --border-focus:  #4a6fa5;
      --accent:        #4f8ef7;
      --accent-hover:  #3a78e6;
      --accent-dim:    rgba(79, 142, 247, 0.12);
      --text-primary:  #e8edf5;
      --text-secondary:#8a95a8;
      --text-muted:    #50596a;
      --success:       #3ecf8e;
      --radius-sm:     6px;
      --radius-md:     10px;
      --radius-lg:     14px;
    }

    body {
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      padding: 40px 20px 60px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text-primary);
    }

    header h1 span {
      color: var(--accent);
    }

    header p {
      margin-top: 8px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    /* ── Layout ── */
    .container {
      max-width: 960px;
      margin: 0 auto;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    @media (max-width: 680px) {
      .grid { grid-template-columns: 1fr; }
    }

    /* ── Cards ── */
    .card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-secondary);
    }

    .card-label .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    .card h2 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      margin-top: -4px;
    }

    textarea {
      width: 100%;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 13.5px;
      line-height: 1.65;
      padding: 14px 16px;
      resize: vertical;
      min-height: 180px;
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
    }

    textarea::placeholder {
      color: var(--text-muted);
    }

    textarea:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(74, 111, 165, 0.18);
    }

    /* ── Action row ── */
    .action-row {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }

    .btn-generate {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: var(--accent);
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-md);
      padding: 12px 32px;
      cursor: pointer;
      transition: background 0.18s, transform 0.1s, box-shadow 0.18s;
      box-shadow: 0 4px 14px rgba(79, 142, 247, 0.28);
      letter-spacing: 0.2px;
    }

    .btn-generate:hover {
      background: var(--accent-hover);
      box-shadow: 0 4px 20px rgba(79, 142, 247, 0.4);
    }

    .btn-generate:active {
      transform: scale(0.97);
    }

    .btn-generate svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    /* ── Output ── */
    .output-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-elevated);
    }

    .output-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-secondary);
    }

    .output-title .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
    }

    .btn-copy {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 14px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .btn-copy:hover {
      background: var(--accent-dim);
      border-color: var(--border-focus);
      color: var(--accent);
    }

    .btn-copy svg {
      width: 13px;
      height: 13px;
    }

    .output-body {
      padding: 28px 24px;
      min-height: 200px;
    }

    .output-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 160px;
      gap: 10px;
      color: var(--text-muted);
      text-align: center;
    }

    .output-placeholder svg {
      width: 36px;
      height: 36px;
      opacity: 0.4;
    }

    .output-placeholder p {
      font-size: 13px;
    }

    .bullet-list {
      display: none; /* shown via JS later */
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .bullet-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      font-size: 13.5px;
      line-height: 1.65;
      color: var(--text-primary);
      transition: border-color 0.15s;
    }

    .bullet-item:hover {
      border-color: var(--border-focus);
    }

    .bullet-marker {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      margin-top: 8px;
      flex-shrink: 0;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      margin-top: 48px;
      color: var(--text-muted);
      font-size: 12px;
    }
  </style>
</head>
<body>

  <header>
    <h1>Resume <span>Bullet</span> Generator</h1>
    <p>Paste a job description and your experience to generate tailored, impactful resume bullets.</p>
  </header>

  <div class="container">

    <!-- Input grid -->
    <div class="grid">

      <div class="card">
        <div class="card-label"><span class="dot"></span>Step 1</div>
        <h2>Job Description</h2>
        <textarea
          id="jobDescription"
          placeholder="Paste the full job description here — responsibilities, required skills, and qualifications…"
          rows="10"
        ></textarea>
      </div>

      <div class="card">
        <div class="card-label"><span class="dot"></span>Step 2</div>
        <h2>Your Work Experience</h2>
        <textarea
          id="workExperience"
          placeholder="Describe your relevant experience, projects, accomplishments, tools used, and any metrics (e.g. improved load time by 40%)…"
          rows="10"
        ></textarea>
      </div>

    </div>

    <!-- Generate button -->
    <div class="action-row">
      <button class="btn-generate" id="generateBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
        Generate Bullets
      </button>
    </div>

    <!-- Output -->
    <div class="output-card">

      <div class="output-header">
        <div class="output-title">
          <span class="dot"></span>
          Generated Bullets
        </div>
        <button class="btn-copy" id="copyBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          Copy to Clipboard
        </button>
      </div>

      <div class="output-body">
        <div class="output-placeholder" id="outputPlaceholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
          <p>Your generated resume bullets will appear here.</p>
        </div>
        <ul class="bullet-list" id="bulletList"></ul>
      </div>

    </div>

  </div>

  <footer>
    <p>Powered by Claude &mdash; Resume Bullet Generator</p>
  </footer>

</body>
</html>
